name: windows-ci

on:
  push:
    branches: [main]
    paths:
      - 'windows/**'
      - '.github/workflows/windows-ci.yml'
  pull_request:
    paths:
      - 'windows/**'
      - '.github/workflows/windows-ci.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore WhatCable.sln

      - name: Build (Release, x64)
        run: dotnet build WhatCable.sln -c Release /p:Platform=x64 --no-restore

      - name: Test
        run: dotnet test WhatCable.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: windows/**/TestResults/*.trx
          if-no-files-found: ignore
