name: windows-ci

on:
  push:
    branches: [main]
    paths:
      - 'windows/**'
      - '.github/workflows/windows-ci.yml'
  pull_request:
    paths:
      - 'windows/**'
      - '.github/workflows/windows-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore WhatCable.sln

      - name: Build (Release, x64)
        run: msbuild WhatCable.sln /p:Configuration=Release /p:Platform=x64

      - name: Test
        run: dotnet test WhatCable.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: CLI smoke test (snapshot --json | jq)
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Path src/WhatCable.Cli/bin -Filter whatcable-cli.exe | Select-Object -First 1
          if (-not $exe) { throw "whatcable-cli.exe not found" }
          & $exe.FullName snapshot --json | jq . | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "snapshot --json | jq exited with $LASTEXITCODE" }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: windows/**/TestResults/*.trx
          if-no-files-found: ignore
